name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Buildozer
        run: |
          yes | buildozer android debug
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Ina-APK
          path: bin/*.apk
