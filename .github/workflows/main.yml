name: CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Build with Buildozer
      uses: ArtemSBulgakov/buildozer-action@v1
      with:
        command: buildozer android debug
    - name: Upload artifacts
      uses: actions/upload-artifact@v2
      with:
        name: Ina-APK
        path: bin/*.apk
